
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candace Barnette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; color: inherit; }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid #e8e8e8;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      letter-spacing: 0.02em;
      color: #1a1a1a;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-item {
      position: relative;
    }

    .nav-item > a {
      font-size: 13px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }

    .nav-item > a:hover { color: #1a1a1a; }

    .nav-item > a svg {
      width: 10px;
      height: 10px;
      opacity: 0.4;
      transition: transform 0.2s;
    }

    .nav-item:hover > a svg { transform: rotate(180deg); }

    .dropdown {
      display: none;
      position: absolute;
      top: 100%;
      padding-top: 10px;
      right: 0;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 0 0 6px;
      min-width: 175px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    .nav-item:hover .dropdown { display: block; }

    .dropdown a {
      display: block;
      padding: 7px 16px;
      font-size: 12px;
      color: #666;
    }

    .dropdown a:hover {
      color: #1a1a1a;
      background: #f7f7f7;
    }

    .dropdown hr {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 5px 0;
    }

    /* HERO */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 2.5rem;
    }

    .hero {
      max-width: 560px;
      padding: 6rem 0;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 6vw, 58px);
      font-weight: 400;
      line-height: 1.1;
      color: #1a1a1a;
      margin-bottom: 1.1rem;
    }

    .hero p {
      font-size: 16px;
      font-weight: 300;
      color: #666;
      line-height: 1.8;
    }

    /* FOOTER */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
      border-top: 1px solid #e8e8e8;
    }

    .footer-name {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      color: #aaa;
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
    }

    .footer-links a {
      font-size: 11px;
      color: #aaa;
    }

    .footer-links a:hover { color: #666; }

    /* MOBILE */
    @media (max-width: 600px) {
      nav { padding: 1.25rem 1.25rem; }
      .nav-links { gap: 1.5rem; }
      main { padding: 0 1.25rem; }
      footer { padding: 1.25rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Candace Barnette</a>
    <ul class="nav-links">

      <li class="nav-item">
        <a href="#">
          Work
          <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <div class="dropdown">
          <a href="/work/case-studies.html">Case studies</a>
          <a href="/work/blogs.html">Blogs</a>
          <a href="/work/newsletters.html">Newsletters</a>
          <a href="/work/articles.html">Articles</a>
          <hr />
          <a href="/work/brand-video.html">Brand video</a>
          <a href="/work/news-packages.html">News packages</a>
        </div>
      </li>

      <li class="nav-item">
        <a href="#">
          About
          <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <div class="dropdown">
          <a href="/about/bio.html">Bio</a>
          <a href="/about/resume.html">Resume</a>
        </div>
      </li>

    </ul>
  </nav>

  <main>
    <div class="hero">
      <h1>Hi. I'm Candace Barnette.</h1>
      <p>I'm a content strategist helping brands tell smarter stories.</p>
    </div>
  </main>

  <footer>
    <span class="footer-name">Candace Barnette</span>
    <div class="footer-links">
      <a href="https://linkedin.com/in/candacebarnette" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:candacebarnette@gmail.com">Email</a>
    </div>
  </footer>

</body>
</html>
